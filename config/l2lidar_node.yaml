l2lidar_node:
  ros__parameters:

    # ---------------- Network ----------------
    l2_ip: "192.168.41.62"
    l2_port: 6101

    host_ip: "192.168.41.77"
    host_port: 6201

    # --------- Time Sync and correction-------
    # both of these must be true for aggregation
    enable_l2_time_correction: true
    enable_l2_host_sync: true
    # adjust time scale numerator and denominator
    #    2,1 -> 2.0 is the ideal
    # you can adjust to correct for what the
    # accuracy of the internal oscillator versus your host
    # for exmaple 1998,1000 ->1.998
    timeScaleNum: 2
    timeScaleDenom: 1

    # sync rate host -> L2 (milliseconds)
    l2_sync_rate_ms: 50

    # ---------------- Latency ----------------
    enable_latency_measure: false

    # ---------------- Frames ----------------
    frame_id: "l2lidar_frame"
    imu_frame_id: "l2lidar_imu"
    robot_id: "base_link"
    robot_x: 0.1
    robot_y: 0.0
    robot_z: 0.25

    # ---------------- Point Cloud ----------------
    frame3d: true
    imu_adjust: false

    # ---------------- Calibration Override ----------------
    EnableCalRangeOVR: false
    calRangeScale: 0.000978
    calRangeBias: -365.625
    
    #----------------- Watch dog timer -----
    watchdog_timeout_ms: 60000

    # ---------------- IMU publishing ------------
    enable_IMU_publishing: true

    # ---------------- point cloud frames ----------------
    # If this is set to 0 there is no aggregation
    # 39 is the number of frames per full hemishpere
    # rotation.  Note that he L2 does not have exactly
    # 39 per rotation.  Th precession of the scans fills
    # in between the last rotation scans.
    aggregateNframes: 38
    
